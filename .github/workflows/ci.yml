name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck / lint / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      # Minimal deps for the current isolated tests (no DB / no torch).
      # As backend test coverage grows to import heavier modules, switch this
      # to `pip install -e .[test]` (and add a postgres service for DB tests).
      - run: pip install pytest pydantic ruff
      - run: ruff check --select F821 .
      - run: pytest
