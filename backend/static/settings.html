<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kátyúőr - Analízis Beállítások</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .category {
            margin-bottom: 40px;
        }
        
        .category-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .setting-item {
            display: grid;
            grid-template-columns: 250px 1fr 150px;
            gap: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 15px;
            background: #fafafa;
            transition: background 0.2s;
        }
        
        .setting-item:hover {
            background: #f0f0f0;
        }
        
        .setting-key {
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
        }
        
        .setting-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .setting-description {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .setting-example {
            color: #888;
            font-size: 0.85rem;
            font-style: italic;
        }
        
        .setting-control {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .setting-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
        }
        
        .setting-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }
        
        .btn-save {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }
        
        .btn-save:hover {
            background: #5568d3;
        }
        
        .btn-save:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
            margin-left: 10px;
        }
        
        .btn-reset:hover {
            background: #e0e0e0;
        }
        
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }
        
        .status-message {
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .setting-item {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .setting-control {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/map.html" class="nav-link">← Vissza a térképhez</a>
        
        <h1>⚙️ Analízis Beállítások</h1>
        <p class="subtitle">Finomhangold az útminőség elemzési algoritmus paramétereit</p>
        
        <div id="status-message" class="status-message"></div>
        
        <div id="settings-container">
            <!-- Settings will be loaded here -->
        </div>
        
        <div class="actions">
            <div>
                <button class="btn-save" onclick="saveAllSettings()">Minden beállítás mentése</button>
                <button class="btn-reset" onclick="resetToDefaults()">Alapértelmezett értékek</button>
            </div>
            <div>
                <a href="/map.html" class="nav-link">Térkép megtekintése</a>
            </div>
        </div>
    </div>
    
    <script>
        let settings = {};
        let originalSettings = {};
        
        async function loadSettings() {
            try {
                const response = await fetch('/api/v1/settings');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                }
                
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`Expected JSON but got: ${contentType}. Response: ${text.substring(0, 200)}`);
                }
                
                const data = await response.json();
                
                // Group by category
                const grouped = {};
                data.forEach(setting => {
                    const category = setting.category || 'Egyéb';
                    if (!grouped[category]) {
                        grouped[category] = [];
                    }
                    grouped[category].push(setting);
                });
                
                // Render settings
                const container = document.getElementById('settings-container');
                container.innerHTML = '';
                
                Object.keys(grouped).sort().forEach(category => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';
                    
                    const title = document.createElement('div');
                    title.className = 'category-title';
                    title.textContent = category;
                    categoryDiv.appendChild(title);
                    
                    grouped[category].forEach(setting => {
                        settings[setting.key] = setting.value;
                        originalSettings[setting.key] = setting.value;
                        
                        const item = document.createElement('div');
                        item.className = 'setting-item';
                        
                        const keyDiv = document.createElement('div');
                        keyDiv.className = 'setting-key';
                        keyDiv.textContent = setting.key;
                        
                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'setting-info';
                        
                        const descDiv = document.createElement('div');
                        descDiv.className = 'setting-description';
                        descDiv.textContent = setting.description || 'Nincs leírás';
                        
                        if (setting.example) {
                            const exampleDiv = document.createElement('div');
                            exampleDiv.className = 'setting-example';
                            exampleDiv.textContent = `Példa: ${setting.example}`;
                            infoDiv.appendChild(exampleDiv);
                        }
                        
                        const controlDiv = document.createElement('div');
                        controlDiv.className = 'setting-control';
                        
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.step = '0.1';
                        input.className = 'setting-input';
                        input.value = setting.value;
                        input.id = `input-${setting.key}`;
                        input.onchange = () => {
                            settings[setting.key] = parseFloat(input.value);
                        };
                        
                        controlDiv.appendChild(input);
                        
                        item.appendChild(keyDiv);
                        item.appendChild(infoDiv);
                        item.appendChild(controlDiv);
                        
                        categoryDiv.appendChild(item);
                    });
                    
                    container.appendChild(categoryDiv);
                });
                
            } catch (error) {
                showMessage('Hiba a beállítások betöltésekor: ' + error.message, 'error');
            }
        }
        
        async function saveAllSettings() {
            const btn = document.querySelector('.btn-save');
            btn.disabled = true;
            btn.textContent = 'Mentés...';
            
            try {
                const updates = [];
                for (const [key, value] of Object.entries(settings)) {
                    if (value !== originalSettings[key]) {
                        updates.push(fetch(`/api/v1/settings/${key}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ value })
                        }));
                    }
                }
                
                await Promise.all(updates);
                
                // Update original settings
                originalSettings = { ...settings };
                
                showMessage('Beállítások sikeresen mentve! Újra kell elemezni a pontokat az új beállítások alkalmazásához.', 'success');
                
            } catch (error) {
                showMessage('Hiba a beállítások mentésekor: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Minden beállítás mentése';
            }
        }
        
        async function resetToDefaults() {
            if (!confirm('Biztosan visszaállítod az alapértelmezett értékeket? Ez felülírja az összes módosítást.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/v1/settings/initialize', { method: 'POST' });
                const data = await response.json();
                
                showMessage('Alapértelmezett értékek visszaállítva. Oldal frissítése...', 'success');
                
                setTimeout(() => {
                    location.reload();
                }, 1500);
                
            } catch (error) {
                showMessage('Hiba az alapértelmezett értékek visszaállításakor: ' + error.message, 'error');
            }
        }
        
        function showMessage(message, type) {
            const msgDiv = document.getElementById('status-message');
            msgDiv.textContent = message;
            msgDiv.className = `status-message ${type}`;
            
            setTimeout(() => {
                msgDiv.className = 'status-message';
            }, 5000);
        }
        
        // Initialize default settings first, then load
        async function initializeAndLoad() {
            try {
                // First, try to initialize settings
                const initResponse = await fetch('/api/v1/settings/initialize', { method: 'POST' });
                if (!initResponse.ok) {
                    const errorText = await initResponse.text();
                    console.warn('Settings initialization warning:', errorText);
                } else {
                    const initData = await initResponse.json();
                    console.log('Settings initialized:', initData);
                }
            } catch (error) {
                console.warn('Settings initialization error:', error);
            }
            
            // Then load settings
            await loadSettings();
        }
        
        // Initialize and load on page load
        initializeAndLoad();
    </script>
</body>
</html>
