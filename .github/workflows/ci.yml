name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck / lint / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      # Minimal deps for the isolated tests (no DB connection / no torch —
      # `pip install -e .` would drag in torch via ultralytics). The auth and
      # permission tests import the real FastAPI app pieces and GraphQL
      # schema, so the web/DB layer packages are required; psycopg2 is only
      # loaded as a dialect, no server is contacted.
      - run: >
          pip install pytest ruff pydantic pydantic-settings httpx
          fastapi sqlalchemy geoalchemy2 psycopg2-binary
          strawberry-graphql sse-starlette alembic "PyJWT[crypto]"
      - run: ruff check --select F821 .
      - run: pytest
